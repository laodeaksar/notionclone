name = "notionclone-api"
main = "src/index.ts"
compatibility_date = "2025-07-18"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 3000
ip = "0.0.0.0"

# ── Production (default) ──────────────────────────────────────────────────────
# Secrets (set via `wrangler secret put NAMA`):
#   BETTER_AUTH_SECRET, CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY,
#   CLOUDINARY_API_SECRET, LIVEBLOCKS_SECRET_KEY

[vars]
BETTER_AUTH_URL = "https://notionclone-api.workers.dev"
ALLOWED_ORIGINS = "https://notionclone-web.vercel.app,https://www.laodeaksar.eu.org"
NODE_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "notionclone"
# Fill after: wrangler d1 create notionclone
database_id = "akan_diisi_setelah_wrangler_d1_create"
migrations_dir = "drizzle"

# Compatibility fix: @better-auth/kysely-adapter needs DEFAULT_MIGRATION_* shim
[alias]
kysely = "./kysely-shim"

# ── Development ───────────────────────────────────────────────────────────────

[env.dev.vars]
BETTER_AUTH_URL = "https://3c448997-bdf0-4f05-beb3-9d3d44199b2b-00-xe3hsltqa4ef.sisko.replit.dev"
ALLOWED_ORIGINS = "http://localhost:5000,http://localhost:5173,http://0.0.0.0:5000,http://0.0.0.0:5173"
NODE_ENV = "development"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "notionclone"
database_id = "akan_diisi_setelah_wrangler_d1_create"
migrations_dir = "drizzle"

[env.dev.alias]
kysely = "./kysely-shim"
