name: Create Neon Branch + Drizzle Push

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Nama branch Neon'
        required: true
        default: 'preview/manual'
        type: string

concurrency:
  group: neon-branch-${{ inputs.branch_name }}

jobs:
  create_and_migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set expiration 14 hari
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ inputs.branch_name }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }

      - name: Install deps
        run: pnpm install

      - name: Drizzle Push ke Neon branch
        run: pnpm --filter @notion-clone/db db:push
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
